version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: logitask-backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=file:./dev.db
      - NODE_ENV=development
      - AUTH_MODE=development
    volumes:
      - ./backend/prisma:/app/prisma
      - backend-data:/app
    working_dir: /app
    command: sh -c "npx prisma db push && npm run prisma:seed && npm run start:dev"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: logitask-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://localhost:4000
    depends_on:
      - backend

volumes:
  backend-data: