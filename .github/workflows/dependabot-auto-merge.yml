name: Auto-Merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:

permissions:
  contents: read
  pull-requests: write
  statuses: read

jobs:
  auto-merge-dependabot:
    runs-on: ubuntu-latest
    if: >
      github.actor == 'dependabot[bot]'
    steps:
      - name: Check if PR is mergeable
        id: check
        run: |
          PR=${{ github.event.pull_request.number }}
          
          # Check mergeable status
          MERGEABLE=$(gh pr view $PR --json mergeable --jq '.mergeable')
          MERGE_STATE=$(gh pr view $PR --json mergeableState --jq '.mergeableState')
          
          echo "Mergeable: $MERGEABLE, State: $MERGE_STATE"
          
          if [ "$MERGEABLE" = "true" ] && [ "$MERGE_STATE" = "clean" ]; then
            echo "can_merge=true" >> $GITHUB_OUTPUT
          else
            echo "can_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge PR
        if: steps.check.outputs.can_merge == 'true'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --admin --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}